services:
  - type: web
    name: jobmatcher-backend
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 60 --access-logfile - --error-logfile -
    healthCheckPath: /health
    healthCheckInterval: 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: APP_NAME
        value: JobMatcher API
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: sqlite:///./jobmatcher.db
