services:
  - type: web
    name: jobmatcher-backend
    env: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: JobMatcher API
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        value: sqlite:///./jobmatcher.db
